upstream email_backend {
    server email-parser:8000;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name email.toytrust.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl;
    server_name email.toytrust.cn;

    ssl_certificate /etc/letsencrypt/live/email.toytrust.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/email.toytrust.cn/privkey.pem;

    access_log /var/log/nginx/email-access.log main;
    error_log /var/log/nginx/email-error.log;

    # Rate limiting
    limit_req zone=api burst=20 nodelay;
    limit_conn conn 10;

    location / {
        proxy_pass http://email_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location /health {
        proxy_pass http://email_backend/health;
        access_log off;
    }
}
