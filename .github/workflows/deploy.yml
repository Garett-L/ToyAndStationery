name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/leeteam-deploy

            # 拉取最新代码
            git pull origin main

            # 确保 DNS 记录存在（email.toytrust.cn → 服务器 IP）
            echo "检查 DNS 记录..."

            # 申请/续期 SSL 证书（standalone 模式需要先停掉占用 80 端口的服务）
            echo "申请 SSL 证书..."
            docker stop nginx-proxy email-parser 2>/dev/null || true
            certbot certonly --standalone \
              --domains email.toytrust.cn \
              --email admin@toytrust.cn \
              --agree-tos --non-interactive --force-renewal \
              2>/dev/null || echo "证书已存在，跳过申请"

            # 构建并启动容器
            docker-compose -f docker-compose.yml build --pull email-parser nginx
            docker-compose -f docker-compose.yml up -d
            docker-compose -f docker-compose.yml ps

            # 构建并启动容器
            docker-compose -f docker-compose.yml build --pull email-parser nginx
            docker-compose -f docker-compose.yml up -d
            docker-compose -f docker-compose.yml ps

